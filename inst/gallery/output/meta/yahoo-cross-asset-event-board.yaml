id: yahoo-cross-asset-event-board
title: Cross-Asset Performance Around Selected Events
subtitle: Equity, bond, FX, and commodity responses indexed from a common start date
summary: >
  A Yahoo-based cross-asset event board showing how major market groups behave
  around selected geopolitical or macro events when rebased to a common level.
description_md: >
  This board compares indexed performance across equities, bonds, FX, and
  commodities around one or more selected event dates. It is designed for
  briefing use, so the emphasis is on relative path comparison rather than raw
  price levels.
