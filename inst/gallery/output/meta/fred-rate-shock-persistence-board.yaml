id: fred-rate-shock-persistence-board
title: 10-Year Treasury Shock Persistence
subtitle: Recent nominal-rate shocks versus simulated and realized follow-through
summary: >
  A FRED-based rates board showing the recent 10-year Treasury yield, large
  daily shocks, an AR-style persistence envelope, and average realized paths
  after major moves.
description_md: >
  This board studies whether recent 10-year Treasury shocks tend to mean-revert
  or persist. It combines recent level history, daily changes, a simple
  AR-style persistence benchmark, and the average historical follow-through
  after large absolute shock days.
