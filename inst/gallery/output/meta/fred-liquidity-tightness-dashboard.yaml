id: fred-liquidity-tightness-dashboard
title: Short-Term Liquidity Tightness Dashboard
subtitle: Funding pressure, reserve drain, transmission, and an integrated tightness score
summary: >
  A short-horizon FRED board tracking whether US money-market rates are pressing
  above the administered floor and whether reserve-side plumbing is tightening.
description_md: >
  This board focuses on the latest three months of US liquidity plumbing.
  Reading clockwise, it tracks floor pressure in EFFR, SOFR, and OBFR versus
  IORB; balance-sheet drain through reserves, TGA, and related plumbing
  components; cross-market transmission through bill and secured funding
  spreads; and a normalized integrated tightness score.
